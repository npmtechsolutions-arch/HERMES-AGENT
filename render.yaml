# Render Blueprint for the HERMUS backend (FastAPI + Postgres).
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
# It provisions the web service + a managed Postgres and wires DATABASE_URL.
services:
  - type: web
    name: hermes-agent-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hermes-db
          property: connectionString
      - key: HERMUS_JWT_SECRET
        generateValue: true
      - key: HERMUS_AUTO_SEED
        value: "1"

databases:
  - name: hermes-db
    plan: free
